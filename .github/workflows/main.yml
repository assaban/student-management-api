name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker image
      run: |
        docker build -t mohssinassaban/student_service:test .

    - name: Run tests with docker-compose
      run: |
        docker run -d -p 8080:8080 --name test-service mohssinassaban/student_service:test
        sleep 10
        docker run --network host --rm -v ${{ github.workspace }}/postman:/etc/newman \
          postman/newman:alpine run /etc/newman/collection.json \
          --environment /etc/newman/environment.json \
          --global-var "base_url=http://localhost:8080/tutorial/1.0.0"
        docker stop test-service

    - name: Log in to Docker Hub
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.REGISTRY_USERNAME }}
        password: ${{ secrets.REGISTRY_PASSWORD }}

    - name: Build and push Docker image
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        docker build -t mohssinassaban/student_service:latest .
        docker push mohssinassaban/student_service:latest